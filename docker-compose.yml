services:
  mcp-server-datahub:
    build: .
    ports:
      - "${MCP_SERVER_PORT:-8000}:8000"
    environment:
      DATAHUB_GMS_URL: ${DATAHUB_GMS_URL}
      DATAHUB_GMS_TOKEN: ${DATAHUB_GMS_TOKEN}
      TOOLS_IS_MUTATION_ENABLED: ${TOOLS_IS_MUTATION_ENABLED:-false}
      TOOLS_IS_USER_ENABLED: ${TOOLS_IS_USER_ENABLED:-false}
